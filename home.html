<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ إليكِ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#ff4e8a,#ff9ec4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    max-width:400px;
    z-index:10;
}

h1{
    color:#ff2d75;
    margin-bottom:20px;
}

p{
    font-size:18px;
    color:#444;
    line-height:1.8;
}

#loveCounter{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:#ff2d75;
    background:#fff0f5;
    padding:15px;
    border-radius:15px;
}

.heart{
    position:absolute;
    color:#ff2d75;
    font-size:24px;
    animation:float 8s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }
    100%{
        transform:translateY(-120vh);
        opacity:1;
    }
}
</style>

</head>
<body>

<div class="card">
    <h1>❤️ أهلاً بكِ هدى ❤️</h1>

    <p>
        كل لحظة معك جميلة،<br>
        وأتمنى أن تظل الابتسامة على وجهك دائمًا. 🌹
    </p>

    <h2>⏳ مضى على علاقتنا</h2>
    <div id="loveCounter"></div>

</div>

<script>

// تاريخ بداية العلاقة
const startDate = new Date("2026-07-10T12:00:00");

function updateCounter(){
    const now = new Date();
    const diff = now - startDate;

    const days = Math.floor(diff/(1000*60*60*24));
    const hours = Math.floor((diff/(1000*60*60))%24);
    const minutes = Math.floor((diff/(1000*60))%60);
    const seconds = Math.floor((diff/1000)%60);

    document.getElementById("loveCounter").innerHTML =
    `❤️ ${days} يوم<br>
     ⏰ ${hours} ساعة ${minutes} دقيقة ${seconds} ثانية`;
}

updateCounter();
setInterval(updateCounter,1000);

// القلوب المتحركة
for(let i=0;i<40;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(5+Math.random()*5)+"s";
    heart.style.fontSize=(15+Math.random()*30)+"px";
    document.body.appendChild(heart);
}

</script>

</body>
</html>
